<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FreshTrack - Scan</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar"><div class="brand">FreshTrack</div><nav class="nav"><a href="/hub/dashboard.html">Dashboard</a><a href="/hub/invoices.html">Invoices</a><a class="active" href="/hub/scan.html">Scan</a><a href="/hub/history.html">History</a></nav></aside>
  <main class="main">
    <div class="topbar"><strong>Scan &amp; Receive</strong><button class="small-btn secondary" onclick="API.logout()">Logout</button></div>
    <div class="scan-shell">
      <section class="card" id="selectCard">
        <div class="grid two"><div><label for="warehouseSelect">Warehouse</label><select id="warehouseSelect"></select></div><div><label for="invoiceSelect">Invoice</label><select id="invoiceSelect"></select></div></div>
      </section>
      <section class="scan-panel" id="scanCard" style="display:none;">
        <label for="scanInput">Scan barcode</label>
        <input id="scanInput" class="scan-input" autofocus autocomplete="off" placeholder="Ready to scan" />
        <div class="scan-actions">
          <button id="incBtn" class="secondary">+1</button>
          <button id="decBtn" class="secondary">-1</button>
          <button id="finishBtn">Finish</button>
        </div>
        <div class="error" id="scanErr" style="display:none;"></div>
      </section>
      <section class="card" id="progressCard" style="display:none;"><h2>Progress</h2><div id="progressList"></div></section>
    </div>
  </main>
</div><div id="toast" class="toast"></div>
<script src="/js/api.js"></script><script src="/js/app.js"></script><script src="/js/scan.js"></script>
</body>
</html>
