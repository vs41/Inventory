<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>FreshTrack - Users</title><link rel="stylesheet" href="/css/style.css" /></head>
<body>
<div class="app">
  <aside class="sidebar"><div class="brand">FreshTrack</div><nav class="nav"><a href="/admin/dashboard.html">Dashboard</a><a href="/admin/users.html">Users</a><a class="active" href="/admin/warehouses.html">Warehouses</a><a href="/admin/user-warehouse-mapping.html">User → Warehouse Mapping</a><a href="/admin/upload.html">Upload</a><a href="/admin/reports.html">Reports</a><a href="/admin/audit.html">Audit</a></nav></aside>
  <main class="main"><div class="topbar"><strong>Users</strong><button class="small-btn secondary" onclick="API.logout()">Logout</button></div>
    <div class="content">
      <div class="grid two">
        <section class="card"><h2>Create User</h2><label>Email</label><input id="email"><label>Password</label><input id="password" type="password"><label>Role</label><select id="role"><option value="hub_user">Hub User</option><option value="central_admin">Central Admin</option></select><label>Warehouse IDs</label><input id="warehouseIds" placeholder="WH-001,WH-002"><button id="saveUser">Create User</button></section>
        <section class="card"><h2>Search</h2><input id="search" placeholder="Search users"><p class="muted">Delete disables the user account.</p></section>
      </div>
      <div class="table-wrap"><table><thead><tr><th>Email</th><th>Role</th><th>Warehouses</th><th>Status</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></div>
    </div>
  </main>
</div><div id="toast" class="toast"></div>
<script src="/js/api.js"></script><script src="/js/app.js"></script><script src="/js/admin-users.js"></script>
</body></html>
