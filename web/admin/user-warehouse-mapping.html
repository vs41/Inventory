<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshTrack - User Warehouse Mapping</title>

<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="app">

<aside class="sidebar">

<div class="brand">FreshTrack</div>

<nav class="nav">
<a href="/admin/dashboard.html">Dashboard</a>
<a href="/admin/users.html">Users</a>
<a href="/admin/warehouses.html">Warehouses</a>

<a class="active" href="/admin/user-warehouse-mapping.html">
User → Warehouse Mapping
</a>

<a href="/admin/upload.html">Upload</a>
<a href="/admin/reports.html">Reports</a>
<a href="/admin/audit.html">Audit</a>
</nav>

</aside>

<main class="main">

<div class="topbar">

<strong>User Warehouse Mapping</strong>

<button class="small-btn secondary" onclick="API.logout()">
Logout
</button>

</div>

<div class="content">

<section class="card">

<h2>Select User</h2>

<input
id="userSearch"
placeholder="Search user..."
>

<select id="userSelect">
<option value="">Select User</option>
</select>

</section>

<section class="card">

<div
style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
">

<h2>Warehouses</h2>

<div>

<button
class="small-btn"
id="selectAllBtn"
>
Select All
</button>

<button
class="small-btn secondary"
id="clearAllBtn"
>
Clear All
</button>

</div>

</div>

<input
id="warehouseSearch"
placeholder="Search warehouse..."
>

<div
id="warehouseList"
style="
margin-top:15px;
max-height:420px;
overflow:auto;
"
>

</div>

<div
style="margin-top:20px"
>

<button
id="saveBtn"
disabled
>
Save Mapping
</button>

</div>

</section>

</div>

</main>

</div>

<div
id="toast"
class="toast"
></div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/user-warehouse-mapping.js"></script>

</body>
</html>
